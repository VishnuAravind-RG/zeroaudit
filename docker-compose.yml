version: "3.9"

services:

  # ── Apache Cassandra (LSM-Tree write absorber) ─────────────────────────────
  cassandra:
    image: cassandra:4.1
    container_name: zeroaudit-cassandra
    ports:
      - "9042:9042"
    environment:
      CASSANDRA_CLUSTER_NAME: zeroaudit-cluster
      CASSANDRA_DC: dc1
      HEAP_NEWSIZE: 128M
      MAX_HEAP_SIZE: 512M
    volumes:
      - cassandra_data:/var/lib/cassandra
      - ./services/cassandra/init.cql:/docker-entrypoint-initdb.d/init.cql
    healthcheck:
      test: ["CMD", "cqlsh", "-e", "describe keyspaces"]
      interval: 30s
      timeout: 10s
      retries: 10

  # ── Apache Zookeeper (Kafka dependency) ───────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: zeroaudit-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  # ── Apache Kafka ─────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: zeroaudit-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 20s
      timeout: 10s
      retries: 5

  # ── Kafka Topic Init ──────────────────────────────────────────────────────
  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    container_name: zeroaudit-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "/scripts/create_topics.sh"]
    volumes:
      - ./services/kafka/create_topics.sh:/scripts/create_topics.sh

  # ── ZEROAUDIT Prover (SGX Enclave Prover) ────────────────────────────────
  prover:
    build:
      context: .
      dockerfile: Dockerfile.prover
    container_name: zeroaudit-prover
    depends_on:
      cassandra:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      KAFKA_BOOTSTRAP: kafka:29092
      CASSANDRA_HOSTS: cassandra
      CASSANDRA_KEYSPACE: zeroaudit
      LOG_LEVEL: INFO
      API_HOST: 0.0.0.0
      API_PORT: "8000"
      ANOMALY_THRESHOLD: "0.75"
    env_file:
      - .env
    restart: unless-stopped

  # ── ZEROAUDIT Verifier (External DMZ) ────────────────────────────────────
  verifier:
    build:
      context: .
      dockerfile: Dockerfile.verifier
    container_name: zeroaudit-verifier
    depends_on:
      - kafka
      - prover
    environment:
      KAFKA_BOOTSTRAP: kafka:29092
      LOG_LEVEL: INFO
    env_file:
      - .env
    restart: unless-stopped

  # ── Bank Simulator ────────────────────────────────────────────────────────
  simulator:
    build:
      context: .
      dockerfile: Dockerfile.simulator
    container_name: zeroaudit-simulator
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP: kafka:29092
      SIM_TPS: "15"
      SIM_ANOMALY_RATE: "0.05"
    restart: unless-stopped

  # ── ZEROAUDIT Dashboard (Static HTML) ────────────────────────────────────
  dashboard:
    build: ./dashboard
    container_name: zeroaudit-dashboard
    ports:
      - "3000:80"
    depends_on:
      - prover

volumes:
  cassandra_data: